<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Trishul Pro — Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; border-radius:0 !important; font-family:'Rajdhani',sans-serif; }
:root {
  --gold:#f5c518; --gold2:#c9a000;
  --bg:#000; --bg2:#0a0a0a; --bg3:#121212; --bg4:#1a1a1a;
  --border:#222; --bordergold:#3d3000;
  --text:#eee; --dim:#777;
  --green:#00c853; --red:#ff3d3d; --orange:#ff6d00;
  --chart-grid:#15150a;
}
html,body { height:100%; background:var(--bg); color:var(--text); overflow:hidden; }

.app { height:100vh; max-width:430px; margin:0 auto; display:flex; flex-direction:column; background:var(--bg); overflow:hidden; }

/* HEADER */
.chart-header { flex-shrink:0; background:var(--bg2); border-bottom:1px solid var(--gold); padding:10px 14px; display:flex; justify-content:space-between; align-items:flex-start; }
.ch-left { display:flex; flex-direction:column; gap:4px; }
.stock-name { font-family:'Orbitron',sans-serif; font-size:20px; font-weight:900; color:var(--gold); letter-spacing:2px; }
.stock-legend { display:flex; gap:12px; font-size:9px; color:var(--dim); }
.legend-item { display:flex; align-items:center; gap:4px; }
.leg-line { width:14px; height:2px; background:var(--gold); }
.leg-line.dashed { background:repeating-linear-gradient(90deg, #64b5f6 0 4px, transparent 4px 7px); }

.ch-right { text-align:right; }
.stock-price { font-family:'Orbitron',sans-serif; font-size:22px; font-weight:900; color:var(--red); }
.stock-chg { font-size:11px; color:var(--red); margin-top:2px; }
.stock-fv { font-size:9px; color:var(--dim); margin-top:3px; }
.stock-fv b { color:var(--gold); }

/* TIMEFRAME + SEARCH ROW */
.tf-row { flex-shrink:0; display:flex; gap:4px; padding:8px 10px; background:var(--bg2); border-bottom:1px solid var(--border); align-items:center; }
.tf-btn {
  padding:5px 12px; background:var(--bg3); border:1px solid var(--border);
  color:var(--dim); font-size:11px; font-weight:700; cursor:pointer;
  font-family:'Rajdhani',sans-serif; letter-spacing:0.5px;
}
.tf-btn.active { background:var(--gold); color:#000; border-color:var(--gold); }
.stock-search {
  flex:1; margin-left:4px;
  background:var(--bg3); border:1px solid var(--bordergold);
  padding:5px 10px; color:var(--gold); font-size:11px; font-weight:700;
  font-family:'Rajdhani',sans-serif; letter-spacing:1px; text-align:center;
  outline:none; min-width:0;
}
.stock-search:focus { border-color:var(--gold); }
.stock-search::placeholder { color:var(--dim); font-weight:500; }

/* CHART AREA */
.chart-wrap {
  flex:1;
  background:var(--bg);
  position:relative;
  overflow:hidden;
  border-bottom:1px solid var(--border);
  min-height:0;
}
.chart-svg { width:100%; height:100%; display:block; }
.chart-price-label {
  position:absolute; right:4px; top:50%;
  background:var(--gold); color:#000;
  padding:3px 8px; font-size:11px; font-weight:800;
  font-family:'Orbitron',sans-serif; transform:translateY(-50%);
  z-index:5;
}

/* ZOOM BAR */
.zoom-bar {
  flex-shrink:0; background:var(--bg2);
  padding:5px 10px; display:flex; justify-content:space-between; align-items:center;
  border-bottom:1px solid var(--border);
}
.zoom-info { font-size:10px; color:var(--dim); font-family:'Rajdhani',sans-serif; }
.zoom-btns { display:flex; gap:4px; }
.zoom-btn {
  width:26px; height:22px;
  background:var(--bg3); border:1px solid var(--border);
  color:var(--text); font-size:14px; font-weight:700; cursor:pointer;
}
.zoom-btn.minus { color:var(--red); border-color:var(--red); }
.zoom-btn.plus { color:var(--green); border-color:var(--green); }

/* INDICATORS GRID */
.ind-grid {
  flex-shrink:0;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:0;
  border-bottom:1px solid var(--border);
}
.ind-cell {
  padding:6px 4px; text-align:center;
  border:1px solid var(--border);
  background:var(--bg2);
}
.ind-cell.buy { background:#002a14; border-color:var(--green); }
.ind-cell.sell { background:#2a0000; border-color:var(--red); }
.ind-cell.ntrl { background:var(--bg3); border-color:var(--bordergold); }
.ind-name { font-size:8px; font-weight:700; letter-spacing:0.5px; }
.ind-cell.buy .ind-name { color:#66ff99; }
.ind-cell.sell .ind-name { color:#ff8888; }
.ind-cell.ntrl .ind-name { color:var(--gold); }
.ind-val { font-size:12px; font-weight:800; color:var(--text); font-family:'Orbitron',sans-serif; margin-top:1px; }
.ind-sig { font-size:8px; font-weight:700; margin-top:1px; letter-spacing:1px; }
.ind-cell.buy .ind-sig { color:var(--green); }
.ind-cell.sell .ind-sig { color:var(--red); }
.ind-cell.ntrl .ind-sig { color:var(--dim); }

/* NAV */
.bottom-nav { flex-shrink:0; display:flex; background:var(--bg2); border-top:1px solid var(--gold); }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; padding:7px 4px; cursor:pointer; gap:3px; }
.nav-icon { font-size:17px; }
.nav-label { font-size:8px; color:var(--dim); letter-spacing:0.5px; font-weight:700; }
.nav-item.active .nav-label { color:var(--gold); }
.nav-item.active .nav-icon { filter:drop-shadow(0 0 4px var(--gold)); }

/* TOAST */
.toast {
  position:fixed; top:-60px; left:50%; transform:translateX(-50%);
  background:var(--bg3); border-left:3px solid var(--gold);
  padding:8px 16px; font-size:10px; color:var(--text);
  z-index:4000; transition:top .3s; white-space:nowrap;
}
.toast.show { top:10px; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="app">

  <!-- HEADER -->
  <div class="chart-header">
    <div class="ch-left">
      <div class="stock-name" id="stockName">NIFTY</div>
      <div class="stock-legend">
        <div class="legend-item"><div class="leg-line"></div> EMA Fusion</div>
        <div class="legend-item"><div class="leg-line dashed"></div> VWAP</div>
      </div>
    </div>
    <div class="ch-right">
      <div class="stock-price" id="stockPrice">24963.08</div>
      <div class="stock-chg" id="stockChg">▼ -0.18%</div>
      <div class="stock-fv">F: <b id="fVal">24927.62</b> VP: <b id="vpVal">24617.87</b></div>
    </div>
  </div>

  <!-- TIMEFRAME + SEARCH -->
  <div class="tf-row">
    <div class="tf-btn" onclick="setTF(this,'1m')">1m</div>
    <div class="tf-btn" onclick="setTF(this,'5m')">5m</div>
    <div class="tf-btn active" onclick="setTF(this,'10m')">10m</div>
    <div class="tf-btn" onclick="setTF(this,'15m')">15m</div>
    <div class="tf-btn" onclick="setTF(this,'1h')">1h</div>
    <div class="tf-btn" onclick="setTF(this,'1D')">1D</div>
    <input class="stock-search" id="stockSearch" placeholder="🔍 Search Stock..." onkeypress="if(event.key==='Enter')loadStock()"/>
  </div>

  <!-- CHART AREA -->
  <div class="chart-wrap">
    <svg class="chart-svg" id="chartSvg" viewBox="0 0 400 300" preserveAspectRatio="none"></svg>
    <div class="chart-price-label" id="priceLabel">24963.08</div>
  </div>

  <!-- ZOOM BAR -->
  <div class="zoom-bar">
    <div class="zoom-info" id="zoomInfo">ZOOM 2× — 60 candles</div>
    <div class="zoom-btns">
      <button class="zoom-btn minus" onclick="zoom(-1)">−</button>
      <button class="zoom-btn plus" onclick="zoom(1)">+</button>
    </div>
  </div>

  <!-- INDICATORS -->
  <div class="ind-grid" id="indGrid"></div>

  <!-- NAV -->
  <div class="bottom-nav">
    <div class="nav-item" onclick="setNav(this)"><div class="nav-icon">🏠</div><div class="nav-label">HOME</div></div>
    <div class="nav-item" onclick="setNav(this)"><div class="nav-icon">📡</div><div class="nav-label">SIGNAL</div></div>
    <div class="nav-item" onclick="setNav(this)"><div class="nav-icon">⚡</div><div class="nav-label">POWER</div></div>
    <div class="nav-item active" onclick="setNav(this)"><div class="nav-icon">📊</div><div class="nav-label">CHART</div></div>
    <div class="nav-item" onclick="setNav(this)"><div class="nav-icon">⭐</div><div class="nav-label">WATCH</div></div>
  </div>

</div>

<script>
if(window.self!==window.top){var _n=document.querySelector('.bottom-nav');if(_n)_n.remove();}
// Stock database
const STOCKS = {
  'NIFTY':     { price:24963.08, f:24927.62, vp:24617.87, chg:-0.18 },
  'SENSEX':    { price:81420.55, f:81350,    vp:81120,    chg:0.42 },
  'BANKNIFTY': { price:51320.40, f:51280,    vp:51050,    chg:0.55 },
  'RELIANCE':  { price:2460.50,  f:2450,     vp:2420,     chg:1.2 },
  'HDFC':      { price:1678.30,  f:1670,     vp:1650,     chg:0.8 },
  'TCS':       { price:3890.75,  f:3905,     vp:3920,     chg:-1.1 },
  'INFY':      { price:1890.20,  f:1895,     vp:1905,     chg:-0.4 },
  'ICICI':     { price:1245.60,  f:1230,     vp:1215,     chg:1.5 },
};

let currentStock = 'NIFTY';
let zoomLevel = 2;

// INDICATORS DATA (as per photo)
const INDICATORS = [
  { n:'RSI',    v:'61',     s:'BUY',  cls:'buy' },
  { n:'MACD',   v:'+7.0',   s:'BUY',  cls:'buy' },
  { n:'ADX',    v:'12',     s:'NTRL', cls:'ntrl' },
  { n:'CCI',    v:'142',    s:'BUY',  cls:'buy' },
  { n:'MFI',    v:'69',     s:'BUY',  cls:'buy' },
  { n:'OBV',    v:'+407K',  s:'BUY',  cls:'buy' },
  { n:'CVD',    v:'+427K',  s:'BUY',  cls:'buy' },
  { n:'ATR',    v:'58.9',   s:'SELL', cls:'sell' },
  { n:'STOCH',  v:'69',     s:'NTRL', cls:'ntrl' },
  { n:'Z-LAG',  v:'24958',  s:'BUY',  cls:'buy' },
  { n:'ORB',    v:'BRK↑',   s:'BUY',  cls:'buy' },
  { n:'VWAP',   v:'24618',  s:'BUY',  cls:'buy' },
  { n:'PCR',    v:'1.00',   s:'NTRL', cls:'ntrl' },
  { n:'OI',     v:'+7.3%',  s:'BUY',  cls:'buy' },
  { n:'VROC',   v:'+402.9%', s:'BUY', cls:'buy' },
  { n:'MFI-D',  v:'69',     s:'BUY',  cls:'buy' },
];

function renderIndicators() {
  const grid = document.getElementById('indGrid');
  grid.innerHTML = INDICATORS.map(i => `
    <div class="ind-cell ${i.cls}">
      <div class="ind-name">${i.n}</div>
      <div class="ind-val">${i.v}</div>
      <div class="ind-sig">${i.s}</div>
    </div>`).join('');
}

// ── CANDLESTICK CHART ──
function generateCandles(count, baseprice) {
  const candles = [];
  let price = baseprice * 0.985;
  for (let i = 0; i < count; i++) {
    const open = price;
    const vol = baseprice * 0.003;
    const trend = (i / count) * baseprice * 0.02; // upward trend
    const move = (Math.random() - 0.4) * vol + trend * 0.05;
    const close = open + move;
    const high = Math.max(open, close) + Math.random() * vol * 0.4;
    const low = Math.min(open, close) - Math.random() * vol * 0.4;
    candles.push({ open, close, high, low });
    price = close;
  }
  return candles;
}

function renderChart(stock) {
  const svg = document.getElementById('chartSvg');
  const W = 400, H = 300;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  const s = STOCKS[stock] || STOCKS.NIFTY;
  const candles = generateCandles(getCandleCount(), s.price);

  // Find min/max for scaling
  let maxP = Math.max(...candles.map(c => c.high));
  let minP = Math.min(...candles.map(c => c.low));
  const pad = (maxP - minP) * 0.1;
  maxP += pad; minP -= pad;

  const candleWidth = (W - 40) / candles.length;

  const yScale = (p) => H - 20 - ((p - minP) / (maxP - minP)) * (H - 40);

  // Build SVG
  let html = `
    <defs>
      <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="${'#15150a'}" stroke-width="0.5"/>
      </pattern>
    </defs>
    <rect width="${W}" height="${H}" fill="#000"/>
    <rect width="${W}" height="${H}" fill="url(#grid)"/>
  `;

  // Horizontal price labels (5 levels)
  for (let i = 0; i <= 4; i++) {
    const p = minP + (maxP - minP) * (i / 4);
    const y = yScale(p);
    html += `<line x1="0" y1="${y}" x2="${W - 40}" y2="${y}" stroke="#1a1a0a" stroke-width="0.5" stroke-dasharray="2,4"/>`;
    html += `<text x="${W - 3}" y="${y + 3}" fill="#555" font-size="8" text-anchor="end" font-family="Rajdhani">${p.toFixed(2)}</text>`;
  }

  // Candles
  candles.forEach((c, i) => {
    const x = 2 + i * candleWidth + candleWidth / 2;
    const isGreen = c.close >= c.open;
    const color = isGreen ? '#00c853' : '#ff3d3d';

    // Wick
    html += `<line x1="${x}" y1="${yScale(c.high)}" x2="${x}" y2="${yScale(c.low)}" stroke="${color}" stroke-width="1"/>`;

    // Body
    const bodyTop = yScale(Math.max(c.open, c.close));
    const bodyBot = yScale(Math.min(c.open, c.close));
    const bodyH = Math.max(1, bodyBot - bodyTop);
    html += `<rect x="${x - candleWidth * 0.35}" y="${bodyTop}" width="${candleWidth * 0.7}" height="${bodyH}" fill="${color}"/>`;
  });

  // EMA line (gold)
  let emaPath = 'M ';
  let ema = candles[0].close;
  const alpha = 2 / (9 + 1);
  candles.forEach((c, i) => {
    ema = c.close * alpha + ema * (1 - alpha);
    const x = 2 + i * candleWidth + candleWidth / 2;
    const y = yScale(ema);
    emaPath += `${x},${y} `;
  });
  html += `<polyline points="${emaPath.replace('M ','')}" fill="none" stroke="#f5c518" stroke-width="1.5"/>`;

  // VWAP (dashed blue) - realistic - trending up from below
  let vwapPath = '';
  let cumVol = 0, cumPV = 0;
  candles.forEach((c, i) => {
    const vol = 1000 + Math.random() * 2000;
    cumVol += vol;
    cumPV += ((c.high + c.low + c.close) / 3) * vol;
    let vwap = cumPV / cumVol;
    // Bias VWAP slightly below current trend for visibility
    vwap = vwap - (maxP - minP) * 0.08 + (i / candles.length) * (maxP - minP) * 0.15;
    const x = 2 + i * candleWidth + candleWidth / 2;
    const y = yScale(vwap);
    vwapPath += `${x},${y} `;
  });
  html += `<polyline points="${vwapPath}" fill="none" stroke="#64b5f6" stroke-width="1.5" stroke-dasharray="5,3" opacity="1"/>`;

  // Current price line
  const currentY = yScale(candles[candles.length - 1].close);
  html += `<line x1="0" y1="${currentY}" x2="${W - 40}" y2="${currentY}" stroke="#f5c518" stroke-width="1" stroke-dasharray="2,2"/>`;

  // Support zone (green)
  const supportP = minP + (maxP - minP) * 0.15;
  html += `<rect x="0" y="${yScale(supportP + pad/2)}" width="${W - 40}" height="${(maxP-minP) * 0.05 / (maxP-minP) * (H-40)}" fill="#00c853" opacity="0.08"/>`;

  // Resistance zone (red)
  const resistP = minP + (maxP - minP) * 0.9;
  html += `<rect x="0" y="${yScale(resistP + pad/2)}" width="${W - 40}" height="${(maxP-minP) * 0.05 / (maxP-minP) * (H-40)}" fill="#ff3d3d" opacity="0.08"/>`;

  svg.innerHTML = html;

  // Update price label position
  const label = document.getElementById('priceLabel');
  const chartWrap = document.querySelector('.chart-wrap');
  const h = chartWrap.clientHeight;
  label.style.top = ((currentY / H) * 100) + '%';
  label.textContent = s.price.toFixed(2);
}

function setStock(name) {
  const key = name.toUpperCase();
  if (!STOCKS[key]) {
    toast('⚠️ Stock not found: ' + key);
    return;
  }
  currentStock = key;
  const s = STOCKS[key];
  document.getElementById('stockName').textContent = key;
  document.getElementById('stockPrice').textContent = s.price.toLocaleString(undefined, { minimumFractionDigits:2 });
  const chgEl = document.getElementById('stockChg');
  chgEl.textContent = (s.chg >= 0 ? '▲ +' : '▼ ') + s.chg + '%';
  chgEl.style.color = s.chg >= 0 ? 'var(--green)' : 'var(--red)';
  document.getElementById('stockPrice').style.color = s.chg >= 0 ? 'var(--green)' : 'var(--red)';
  document.getElementById('fVal').textContent = s.f.toLocaleString();
  document.getElementById('vpVal').textContent = s.vp.toLocaleString();
  renderChart(key);
  toast('📊 Chart: ' + key);
}

function loadStock() {
  const name = document.getElementById('stockSearch').value.trim();
  if (!name) return;
  setStock(name);
  document.getElementById('stockSearch').value = '';
}

function setTF(el, tf) {
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderChart(currentStock);
  toast('⏱ Timeframe: ' + tf);
}

function zoom(dir) {
  zoomLevel = Math.max(1, Math.min(5, zoomLevel + dir));
  document.getElementById('zoomInfo').textContent = `ZOOM ${zoomLevel}× — ${getCandleCount()} candles`;
  renderChart(currentStock);
}

function getCandleCount() {
  // Less candles = more zoom in (bigger candles visible)
  const counts = { 1: 100, 2: 60, 3: 40, 4: 25, 5: 15 };
  return counts[zoomLevel] || 60;
}

function setNav(el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// INIT
renderIndicators();
setStock('NIFTY');

// Live updates - small price fluctuations
setInterval(() => {
  const s = STOCKS[currentStock];
  s.price += (Math.random() - 0.5) * s.price * 0.0005;
  s.chg = parseFloat((s.chg + (Math.random() - 0.5) * 0.05).toFixed(2));
  setStock(currentStock);
}, 6000);
</script>
</body>
</html>
