<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Trishul Pro — Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; border-radius:0 !important; }
:root {
  --gold:#f5c518; --gold2:#c9a000;
  --bg:#000; --bg2:#080808;
  --border:#1e1a00;
  --text:#fff; --dim:#777;
  --green:#00c853; --red:#ff3d3d; --orange:#ff6d00;
}
html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Rajdhani',sans-serif; overflow:hidden; }

.app { height:100vh; max-width:430px; margin:0 auto; display:flex; flex-direction:column; background:var(--bg); overflow:hidden; }

.topbar { flex-shrink:0; background:var(--bg2); border-bottom:2px solid var(--gold); padding:10px 14px; display:flex; align-items:center; justify-content:space-between; }
.tb-title { font-family:'Orbitron',sans-serif; font-size:15px; font-weight:900; color:var(--gold); letter-spacing:2px; }
.gemini-pill { display:flex; align-items:center; gap:4px; font-size:9px; color:var(--dim); }
.g-dot { width:6px; height:6px; background:var(--green); animation:blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.scanner-grid { flex:1; display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr); border:2px solid var(--gold); margin:4px; overflow:hidden; }

.sc-box { background:var(--bg); border:1px solid var(--border); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; cursor:pointer; position:relative; overflow:hidden; transition:background 0.15s; }
.sc-box:active { background:#0d0d00; }
.sc-box::after { content:''; position:absolute; top:0; left:15%; right:15%; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }

.sc-icon { font-size:22px; line-height:1; filter:drop-shadow(0 0 6px rgba(245,197,24,0.5)); }
.sc-tag { font-size:7px; font-weight:700; color:var(--gold); letter-spacing:2px; opacity:0.8; }
.sc-name { font-size:12px; font-weight:700; color:var(--text); letter-spacing:0.5px; text-align:center; line-height:1.2; padding:0 4px; }
.sc-live { display:flex; align-items:center; gap:3px; font-size:8px; color:var(--dim); }
.live-dot { width:5px; height:5px; background:var(--green); animation:blink 1.5s infinite; }

.bottom-nav { flex-shrink:0; display:flex; background:var(--bg2); border-top:2px solid var(--gold); }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; padding:7px 4px; cursor:pointer; gap:2px; }
.nav-icon { font-size:20px; }
.nav-label { font-size:8px; color:var(--dim); letter-spacing:0.5px; font-weight:700; }
.nav-item.active .nav-label { color:var(--gold); }
.nav-item.active .nav-icon { filter:drop-shadow(0 0 5px var(--gold)); }

/* MODAL */
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.94); display:none; align-items:center; justify-content:center; z-index:100; }
.modal-bg.show { display:flex; }
.modal-box { background:var(--bg2); border:2px solid var(--gold); width:calc(100% - 24px); max-width:390px; padding:14px; }
.m-header { display:flex; align-items:center; justify-content:space-between; padding-bottom:10px; border-bottom:1px solid var(--border); margin-bottom:12px; }
.m-title { font-family:'Orbitron',sans-serif; font-size:13px; color:var(--gold); letter-spacing:1px; display:flex; align-items:center; gap:8px; }
.m-close { background:none; border:1px solid var(--border); color:var(--dim); font-size:18px; cursor:pointer; width:28px; height:28px; display:flex; align-items:center; justify-content:center; }

.today-label { font-size:8px; color:var(--dim); letter-spacing:2px; margin-bottom:6px; }
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:5px; margin-bottom:10px; }
.stat-box { background:#0a0a00; border:1px solid var(--border); padding:8px 4px; text-align:center; }
.stat-lbl { font-size:7px; color:var(--dim); letter-spacing:1px; margin-bottom:3px; }
.stat-val { font-size:18px; font-weight:700; }
.sv-gold { color:var(--gold); } .sv-green { color:var(--green); } .sv-red { color:var(--red); } .sv-orange { color:var(--orange); }

.ratio-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.ratio-label { font-size:9px; color:var(--dim); white-space:nowrap; }
.ratio-bar { flex:1; height:10px; background:#0a0a00; border:1px solid var(--border); overflow:hidden; }
.ratio-fill { height:100%; background:linear-gradient(90deg,var(--green),#00ff7a); transition:width 0.8s; }
.ratio-pct { font-size:12px; font-weight:700; color:var(--green); white-space:nowrap; }

.breakdown-row { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:10px; }
.bk-box { background:#0a0a00; border:1px solid var(--border); padding:10px; text-align:center; position:relative; overflow:hidden; }
.bk-box.buy-box { border-color:#004a20; background:#001a0a; }
.bk-box.sell-box { border-color:#4a0000; background:#1a0000; }
.bk-box::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
.bk-box.buy-box::before { background:var(--green); }
.bk-box.sell-box::before { background:var(--red); }
.bk-lbl { font-size:8px; letter-spacing:2px; margin-bottom:4px; }
.bk-box.buy-box .bk-lbl { color:var(--green); }
.bk-box.sell-box .bk-lbl { color:var(--red); }
.bk-count { font-size:26px; font-weight:700; }
.bk-box.buy-box .bk-count { color:var(--green); }
.bk-box.sell-box .bk-count { color:var(--red); }
.bk-sub { font-size:9px; color:var(--dim); margin-top:2px; }

.tgt-label { font-size:8px; color:var(--dim); letter-spacing:2px; margin-bottom:6px; text-align:center; }
.tgt-row { display:grid; grid-template-columns:repeat(3,1fr); gap:5px; margin-bottom:10px; }
.tgt-box { border:2px solid var(--border); background:var(--bg); padding:10px 4px; text-align:center; transition:all 0.4s; }
.tgt-box.hit { border-color:var(--green); background:#001a0a; }
.tgt-box.partial { border-color:var(--orange); background:#1a0800; }
.tgt-name { font-size:8px; letter-spacing:1px; margin-bottom:4px; }
.tgt-box.hit .tgt-name { color:var(--green); }
.tgt-box.partial .tgt-name { color:var(--orange); }
.tgt-box .tgt-name { color:var(--dim); }
.tgt-count { font-size:22px; font-weight:700; }
.tgt-box.hit .tgt-count { color:var(--green); }
.tgt-box.partial .tgt-count { color:var(--orange); }
.tgt-box .tgt-count { color:var(--text); }
.tgt-status { font-size:9px; margin-top:3px; }
.tgt-box.hit .tgt-status { color:var(--green); }
.tgt-box.partial .tgt-status { color:var(--orange); }
.tgt-box .tgt-status { color:var(--dim); }

.criteria-label { font-size:8px; color:var(--dim); letter-spacing:2px; margin-bottom:6px; }
.criteria-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px; }
.cr-item { display:flex; align-items:center; gap:6px; background:#0a0a00; border:1px solid var(--border); padding:5px 8px; }
.cr-dot { width:7px; height:7px; flex-shrink:0; background:var(--green); }
.cr-name { font-size:10px; color:var(--text); }
.cr-val { font-size:10px; margin-left:auto; color:var(--green); }

.scan-now { width:100%; background:linear-gradient(135deg,var(--gold2),var(--gold)); color:#000; border:none; padding:11px; font-family:'Orbitron',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; cursor:pointer; margin-top:10px; display:flex; align-items:center; justify-content:center; gap:8px; }
</style>
</head>
<body>

<div class="modal-bg" id="modalBg" onclick="closeModal()">
<div class="modal-box" onclick="event.stopPropagation()">
  <div class="m-header">
    <div class="m-title"><span id="mIcon">⚡</span><span id="mName">BRAHMASTRA</span></div>
    <button class="m-close" onclick="closeModal()">✕</button>
  </div>
  <div class="today-label">📅 TODAY'S PERFORMANCE</div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-lbl">TOTAL</div><div class="stat-val sv-gold" id="mTotal">0</div></div>
    <div class="stat-box"><div class="stat-lbl">WIN</div><div class="stat-val sv-green" id="mWin">0</div></div>
    <div class="stat-box"><div class="stat-lbl">SL HIT</div><div class="stat-val sv-red" id="mSL">0</div></div>
    <div class="stat-box"><div class="stat-lbl">PENDING</div><div class="stat-val sv-orange" id="mPend">0</div></div>
  </div>
  <div class="ratio-row">
    <div class="ratio-label">WIN RATIO</div>
    <div class="ratio-bar"><div class="ratio-fill" id="ratioFill" style="width:0%"></div></div>
    <div class="ratio-pct" id="ratioPct">0%</div>
  </div>
  <div class="breakdown-row">
    <div class="bk-box buy-box">
      <div class="bk-lbl">▲ BUY SIGNALS</div>
      <div class="bk-count" id="mBuy">0</div>
      <div class="bk-sub" id="mBuySub">0 WIN · 0 SL</div>
    </div>
    <div class="bk-box sell-box">
      <div class="bk-lbl">▼ SELL SIGNALS</div>
      <div class="bk-count" id="mSell">0</div>
      <div class="bk-sub" id="mSellSub">0 WIN · 0 SL</div>
    </div>
  </div>
  <div class="tgt-label">🎯 TARGET HIT COUNT</div>
  <div class="tgt-row">
    <div class="tgt-box" id="tgt1"><div class="tgt-name">TARGET 1</div><div class="tgt-count" id="t1c">0</div><div class="tgt-status" id="t1s">--</div></div>
    <div class="tgt-box" id="tgt2"><div class="tgt-name">TARGET 2</div><div class="tgt-count" id="t2c">0</div><div class="tgt-status" id="t2s">--</div></div>
    <div class="tgt-box" id="tgt3"><div class="tgt-name">TARGET 3</div><div class="tgt-count" id="t3c">0</div><div class="tgt-status" id="t3s">--</div></div>
  </div>
  <div class="criteria-label">⚙️ SCANNER CRITERIA</div>
  <div class="criteria-grid" id="crGrid"></div>
  <button class="scan-now" onclick="closeModal()">🔍 CLOSE & SCAN LIVE</button>
</div>
</div>

<div class="app">
  <div class="topbar">
    <div class="tb-title">🔱 TRISHUL PRO MASTER</div>
    <div class="gemini-pill"><div class="g-dot"></div><span>AI ACTIVE</span></div>
  </div>
  <div class="scanner-grid" id="scannerGrid"></div>
  <div class="bottom-nav">
    <div class="nav-item" onclick="goPage('home')"><div class="nav-icon">🏠</div><div class="nav-label">HOME</div></div>
    <div class="nav-item active"><div class="nav-icon">📡</div><div class="nav-label">SIGNAL</div></div>
    <div class="nav-item" onclick="goPage('chart')"><div class="nav-icon">📊</div><div class="nav-label">CHART</div></div>
    <div class="nav-item" onclick="goPage('watch')"><div class="nav-icon">⭐</div><div class="nav-label">WATCH</div></div>
    <div class="nav-item" onclick="goPage('admin')"><div class="nav-icon">⚙️</div><div class="nav-label">ADMIN</div></div>
  </div>
</div>

<script>
const SCANNERS = [
  { name:'MORNING\nBELL', icon:'🔔', criteria:['Price >500','Score 0-100','CMF > 0','OBV Rising','15m Breakout','Sector OK'], total:14, buy:10, sell:4, win:11, sl:2, pending:1, t1:11, t2:8, t3:5 },
  { name:'MAHAKAL', icon:'⚡', criteria:['Candlestick','Chart Pattern','Trendline','S/R Zone','Fibonacci','Round No','Risk Reward','Mkt Structure'], total:12, buy:9, sell:3, win:10, sl:1, pending:1, t1:10, t2:7, t3:4 },
  { name:'BHERVE', icon:'🌊', criteria:['Vol Profile','Smart Money','HMA Wave','Bollinger','Elder Impulse','Fixed Range','SuperTrend'], total:10, buy:7, sell:3, win:8, sl:2, pending:0, t1:8, t2:6, t3:3 },
  { name:'INDEX\nPOWER', icon:'📡', criteria:['Intl Indices','PCR+Volume','S/R Zones','Sector Wise','Commodity','VIX','FII/DII','DXY'], total:8, buy:6, sell:2, win:7, sl:1, pending:0, t1:7, t2:5, t3:3 },
  { name:'TRISHUL', icon:'🔱', criteria:['US Fed Data','Global News','RBI Policy','Indian Events','Stock News','Manual Override'], total:6, buy:5, sell:1, win:5, sl:1, pending:0, t1:5, t2:4, t3:2 },
  { name:'SUDARSHAN', icon:'☸️', criteria:['Vol+OI+PCR','Prev Day H/L','Day S/R','Horizontal S/R','Trendline','Range BRK','Candlestick','Chart Pattern'], total:16, buy:11, sell:5, win:13, sl:2, pending:1, t1:13, t2:10, t3:7 },
  { name:'BRAHMASTRA', icon:'💥', criteria:['Volume 25%','VWAP 20%','Pivot 18%','RSI 15%','EMA 12%','ADX 10%'], total:18, buy:13, sell:5, win:15, sl:2, pending:1, t1:15, t2:11, t3:8 },
  { name:'EXPIRY\nSCALPER', icon:'⏱️', criteria:['PCR Ratio','MMI Index','Open Int','7EMA Sync','VWAP Sync','Time Lock'], total:9, buy:7, sell:2, win:8, sl:1, pending:0, t1:8, t2:6, t3:4 },
  { name:'ALL-IN-ONE', icon:'🚐', criteria:['5/8 Scanner','Score Meter','Power Table','Entry Signal','Target Auto','Must Buy'], total:7, buy:7, sell:0, win:6, sl:1, pending:0, t1:6, t2:5, t3:4 },
];

function renderGrid() {
  document.getElementById('scannerGrid').innerHTML = SCANNERS.map((sc,i) => `
    <div class="sc-box" onclick="openModal(${i})">
      <div class="sc-icon">${sc.icon}</div>
      <div class="sc-tag">🔱 SCANNER</div>
      <div class="sc-name">${sc.name}</div>
      <div class="sc-live"><div class="live-dot"></div><span>LIVE</span></div>
    </div>`).join('');
}

function openModal(i) {
  const sc = SCANNERS[i];
  document.getElementById('mIcon').textContent = sc.icon;
  document.getElementById('mName').textContent = sc.name.replace('\n',' ');
  document.getElementById('mTotal').textContent = sc.total;
  document.getElementById('mWin').textContent = sc.win;
  document.getElementById('mSL').textContent = sc.sl;
  document.getElementById('mPend').textContent = sc.pending;
  const ratio = Math.round((sc.win/sc.total)*100);
  document.getElementById('ratioFill').style.width = ratio+'%';
  document.getElementById('ratioPct').textContent = ratio+'%';
  document.getElementById('mBuy').textContent = sc.buy;
  document.getElementById('mSell').textContent = sc.sell;
  const bw = Math.round(sc.win*(sc.buy/sc.total));
  const bs = Math.round(sc.sl*(sc.buy/sc.total));
  document.getElementById('mBuySub').textContent = bw+' WIN · '+bs+' SL';
  document.getElementById('mSellSub').textContent = (sc.win-bw)+' WIN · '+(sc.sl-bs)+' SL';
  setTgt('tgt1','t1c','t1s',sc.t1,sc.total);
  setTgt('tgt2','t2c','t2s',sc.t2,sc.total);
  setTgt('tgt3','t3c','t3s',sc.t3,sc.total);
  document.getElementById('crGrid').innerHTML = sc.criteria.map(c=>`
    <div class="cr-item"><div class="cr-dot"></div><div class="cr-name">${c}</div><div class="cr-val">OK</div></div>`).join('');
  document.getElementById('modalBg').classList.add('show');
}

function setTgt(boxId,cId,sId,count,total) {
  const box = document.getElementById(boxId);
  const pct = count/total;
  document.getElementById(cId).textContent = count;
  if(pct>=0.7){ box.className='tgt-box hit'; document.getElementById(sId).textContent='HIT '+count+'x'; }
  else if(pct>=0.4){ box.className='tgt-box partial'; document.getElementById(sId).textContent=count+'x'; }
  else{ box.className='tgt-box'; document.getElementById(sId).textContent=count+'x'; }
}

function closeModal() { document.getElementById('modalBg').classList.remove('show'); }
function setNav(el) { document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); el.classList.add('active'); }
function goPage(p) {
  const map={home:'2_home_page.html',power:'3_power_box.html',chart:'4_chart_page.html',watch:'6_watchlist.html',admin:'8_control_panel.html'};
  if(map[p])window.location.href=map[p];
}

renderGrid();
</script>
</body>
</html>
