<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Trinetra Chart - RELIANCE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0b0e1a; --card:#0d1121; --border:#1a2340;
  --goldbr:#f0bc2e; --fusion:#c8901e;
  --green:#2ecc71; --red:#e74c3c; --orange:#f39c12;
  --white:#dde6f8; --dim:#4a5a78;
}
body{
  background:var(--bg);
  font-family:'Courier New',monospace;
  color:var(--white);
  height:100dvh;
  display:flex;flex-direction:column;
  overflow:hidden;
  max-width:480px;
  margin:0 auto;
}

#hdr{
  background:var(--card);
  border-bottom:1px solid var(--border);
  padding:5px 10px 4px;
  flex-shrink:0;
}
.ht{display:flex;justify-content:space-between;align-items:center;}
#sym{color:var(--goldbr);font-size:14px;font-weight:900;letter-spacing:2px;}
#ltp{font-size:17px;font-weight:900;color:var(--green);}
#chg{font-size:9px;color:var(--green);text-align:right;}
.legs{display:flex;gap:10px;margin-top:2px;font-size:7.5px;}
.leg{display:flex;align-items:center;gap:3px;}
.ll{width:14px;height:2px;border-radius:1px;flex-shrink:0;}

#tf-row{
  display:flex;gap:3px;padding:4px 8px;
  background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;
}
.tf{background:#111827;color:var(--dim);border:1px solid var(--border);
    border-radius:3px;padding:2px 8px;font-size:9px;
    font-family:'Courier New',monospace;font-weight:700;cursor:pointer;transition:all .15s;}
.tf.on{background:var(--goldbr);color:#0b0e1a;border-color:var(--goldbr);}

#main-wrap{
  flex:1;background:var(--bg);position:relative;overflow:hidden;
}
#main-svg{width:100%;height:100%;display:block;}

#zoom-bar{
  display:flex;align-items:center;gap:6px;
  background:var(--card);border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  padding:3px 10px;flex-shrink:0;
}
#zlbl{color:var(--dim);font-size:8px;flex:1;}
.zb{
  width:24px;height:24px;border-radius:3px;
  border:1px solid var(--border);background:#111827;
  font-size:15px;font-weight:900;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .12s;user-select:none;
}
#zb-p{color:var(--green);border-color:#1e4a30;}
#zb-p:active{background:#0d2e1c;transform:scale(.88);}
#zb-m{color:var(--red);border-color:#4a1e1e;}
#zb-m:active{background:#2e0d0d;transform:scale(.88);}

#ind-sec{
  background:var(--card);
  border-top:1px solid var(--border);
  padding:4px 5px 5px;
  flex-shrink:0;
}
#ind-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:3px;
}
.ibox{
  border-radius:0;
  border:1px solid;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:3px 2px;
  height:44px;
  gap:1px;
  cursor:default;
  transition:background .4s, border-color .4s;
}
.buy{ background:#0d2b18; border-color:#1e5c30; }
.sell{ background:#2b0d0d; border-color:#5c1e1e; }
.ntrl{ background:#2b1e06; border-color:#5c3e10; }
.iname{ font-size:7.5px; font-weight:900; letter-spacing:.8px; opacity:.75; }
.buy .iname{color:#6effa0;}
.sell .iname{color:#ff8877;}
.ntrl .iname{color:#ffc060;}
.ival{ font-size:10px; font-weight:900; color:#fff; font-family:'Courier New',monospace; }
.isig{ font-size:7px; font-weight:900; letter-spacing:.8px; padding:1px 4px; border-radius:2px; }
.buy .isig{background:#1a5c30;color:var(--green);}
.sell .isig{background:#5c1a1a;color:var(--red);}
.ntrl .isig{background:#5c3a0a;color:var(--orange);}
@keyframes flash{0%{opacity:1}35%{opacity:.1}100%{opacity:1}}
.flash{animation:flash .4s ease;}
</style>
</head>
<body>

<div id="hdr">
  <div class="ht">
    <span id="sym">RELIANCE</span>
    <div><div id="ltp">—</div><div id="chg">—</div></div>
  </div>
  <div class="legs">
    <div class="leg"><div class="ll" style="background:#c8901e"></div><span style="color:#c8901e">EMA Fusion</span></div>
    <div class="leg"><div class="ll" style="border-top:2px dashed #b0c8ff;height:0;margin-top:1px"></div><span style="color:#b0c8ff">VWAP</span></div>
    <span style="color:var(--dim);font-size:7px;margin-left:auto;">
      F:<b id="v-f" style="color:#c8901e">—</b> &nbsp;VP:<b id="v-vw" style="color:#b0c8ff">—</b>
    </span>
  </div>
</div>

<div id="tf-row">
  <button class="tf" onclick="setTF(this,'1m')">1m</button>
  <button class="tf" onclick="setTF(this,'5m')">5m</button>
  <button class="tf on" onclick="setTF(this,'10m')">10m</button>
  <button class="tf" onclick="setTF(this,'15m')">15m</button>
  <button class="tf" onclick="setTF(this,'1h')">1h</button>
  <button class="tf" onclick="setTF(this,'1D')">1D</button>
</div>

<div id="main-wrap">
  <svg id="main-svg" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div id="zoom-bar">
  <span id="zlbl">ZOOM 1×</span>
  <button class="zb" id="zb-m" onclick="doZoom(-1)">−</button>
  <button class="zb" id="zb-p" onclick="doZoom(+1)">+</button>
</div>

<div id="ind-sec">
  <div id="ind-grid"></div>
</div>

<script>
const NS='http://www.w3.org/2000/svg';
const ZOOM_STEPS=[80,60,44,30,20,12];
let zoomLevel=1, candles=[];
const BASE=2845.60;
const STOCK={high:2890,low:2780,close:2845,atr:70,vol:1000000,avgVol:600000};

function genCandles(n,base,vol){
  let p=base; const a=[];
  for(let i=0;i<n;i++){
    const tr=Math.sin(i/14)*.002+(i>45?.001:0);
    const o=p,mv=(Math.random()-.47+tr)*vol*p,c=o+mv;
    const wk=Math.random()*vol*.4*p;
    a.push({o,h:Math.max(o,c)+wk,l:Math.min(o,c)-wk*Math.random(),c}); p=c;
  }
  return a;
}

function calcEMA(d,p){
  const k=2/(p+1); let prev=d[0].c;
  return d.map(x=>{ prev=x.c*k+prev*(1-k); return prev; });
}
function calcVWAP(d){
  let ct=0,cv=0;
  return d.map(x=>{ const tp=(x.h+x.l+x.c)/3,v=Math.abs(x.c-x.o)*200+600; ct+=tp*v;cv+=v;return ct/cv;});
}
function calcRSI(d,p=14){
  let g=0,l=0; const res=[50];
  for(let i=1;i<d.length;i++){
    const df=d[i].c-d[i-1].c;
    if(i<p){g+=Math.max(0,df);l+=Math.max(0,-df);res.push(50);continue;}
    if(i===p){g/=p;l/=p;}
    else{g=(g*(p-1)+Math.max(0,df))/p;l=(l*(p-1)+Math.max(0,-df))/p;}
    res.push(100-100/(1+(l===0?100:g/l)));
  }
  return res[res.length-1];
}
function calcMACD(d){
  const e12=calcEMA(d,12),e26=calcEMA(d,26);
  const macd=e12.map((v,i)=>v-e26[i]);
  const k=2/10; let prev=macd[0];
  const sig=macd.map(v=>{prev=v*k+prev*(1-k);return prev;});
  const hist=macd[macd.length-1]-sig[sig.length-1];
  return {macd:macd[macd.length-1],sig:sig[sig.length-1],hist};
}
function calcOBV(d){
  let obv=0;
  d.forEach((c,i)=>{ if(i===0)return; const v=Math.abs(c.c-c.o)*500+1000; obv+=c.c>=d[i-1].c?v:-v; });
  return obv;
}
function calcATR(d,p=14){
  const tr=d.map((c,i)=>i===0?c.h-c.l:Math.max(c.h-c.l,Math.abs(c.h-d[i-1].c),Math.abs(c.l-d[i-1].c)));
  let prev=tr[0];
  for(let i=1;i<tr.length;i++) prev=(prev*(p-1)+tr[i])/p;
  return prev;
}
function calcCCI(d,p=20){
  const sl=d.slice(-p);
  const tp=(d[d.length-1].h+d[d.length-1].l+d[d.length-1].c)/3;
  const mean=sl.reduce((s,x)=>s+(x.h+x.l+x.c)/3,0)/sl.length;
  const md=sl.reduce((s,x)=>s+Math.abs((x.h+x.l+x.c)/3-mean),0)/sl.length;
  return md===0?0:(tp-mean)/(0.015*md);
}
function calcVROC(d,p=12){
  const v=Math.abs(d[d.length-1].c-d[d.length-1].o)*500+1000;
  const pv=Math.abs(d[d.length-1-p].c-d[d.length-1-p].o)*500+1000;
  return pv===0?0:((v-pv)/pv)*100;
}
function calcCVD(d){
  let cvd=0;
  d.forEach(c=>{ const v=Math.abs(c.c-c.o)*500+800; cvd+=c.c>=c.o?v:-v; });
  return cvd;
}
function calcMFI(d,p=14){
  const sl=d.slice(-p); let pos=0,neg=0;
  sl.forEach((x,j)=>{
    const tp=(x.h+x.l+x.c)/3,v=Math.abs(x.c-x.o)*500+800,mf=tp*v;
    if(j===0){pos+=mf;return;}
    const ptp=(sl[j-1].h+sl[j-1].l+sl[j-1].c)/3;
    tp>=ptp?pos+=mf:neg+=mf;
  });
  return neg===0?100:100-(100/(1+pos/neg));
}
function calcZeroLag(d,p=21){
  const e1=calcEMA(d,p);
  const d2=d.map((c,i)=>({...c,c:2*c.c-e1[i]}));
  const zl=calcEMA(d2,p);
  return zl[zl.length-1];
}
function calcPCR(d){ return 0.7+Math.sin(d.length/10)*0.4+Math.random()*0.2; }
function calcVolProfile(d){
  const vols=d.slice(-20).map(c=>Math.abs(c.c-c.o)*500+800);
  const avg=vols.reduce((a,b)=>a+b,0)/vols.length;
  return vols[vols.length-1]/avg;
}
function calcORBBreak(d){
  const orbH=Math.max(...d.slice(0,5).map(c=>c.h));
  const orbL=Math.min(...d.slice(0,5).map(c=>c.l));
  const last=d[d.length-1].c;
  if(last>orbH) return {val:'BREAK↑',sig:'BUY'};
  if(last<orbL) return {val:'BREAK↓',sig:'SELL'};
  return {val:'IN RANGE',sig:'NTRL'};
}

const INDS=[
  {id:'rsi',name:'RSI',calc:d=>{const v=calcRSI(d);return{v,sig:v>60?'BUY':v<40?'SELL':'NTRL'};},fmt:v=>v.toFixed(0)},
  {id:'macd',name:'MACD',calc:d=>{const m=calcMACD(d);return{v:m.hist,sig:m.hist>0?'BUY':m.hist<0?'SELL':'NTRL'};},fmt:v=>v.toFixed(1)},
  {id:'adx',name:'ADX',calc:d=>{const atr=calcATR(d,14)/d[d.length-1].c*100;const v=Math.min(60,atr*8+10+Math.random()*5);return{v,sig:v>25?'BUY':'NTRL'};},fmt:v=>v.toFixed(0)},
  {id:'cci',name:'CCI',calc:d=>{const v=calcCCI(d);return{v,sig:v>100?'BUY':v<-100?'SELL':'NTRL'};},fmt:v=>v.toFixed(0)},
  {id:'mfi',name:'MFI',calc:d=>{const v=calcMFI(d);return{v,sig:v>60?'BUY':v<40?'SELL':'NTRL'};},fmt:v=>v.toFixed(0)},
  {id:'obv',name:'OBV',calc:d=>{const v=calcOBV(d);const prev=calcOBV(d.slice(0,-5));return{v:v/1000,sig:v>prev?'BUY':v<prev?'SELL':'NTRL'};},fmt:v=>(v>0?'+':'')+v.toFixed(0)+'K'},
  {id:'vroc',name:'VROC',calc:d=>{const v=calcVROC(d);return{v,sig:v>5?'BUY':v<-5?'SELL':'NTRL'};},fmt:v=>(v>0?'+':'')+v.toFixed(1)+'%'},
  {id:'atr',name:'ATR',calc:d=>{const v=calcATR(d);return{v,sig:v>STOCK.atr*1.1?'SELL':v<STOCK.atr*.8?'BUY':'NTRL'};},fmt:v=>v.toFixed(1)},
  {id:'cvd',name:'CVD',calc:d=>{const v=calcCVD(d);return{v:v/1000,sig:v>0?'BUY':v<0?'SELL':'NTRL'};},fmt:v=>(v>0?'+':'')+v.toFixed(0)+'K'},
  {id:'pcr',name:'PCR',calc:d=>{const v=calcPCR(d);return{v,sig:v>1.2?'BUY':v<0.8?'SELL':'NTRL'};},fmt:v=>v.toFixed(2)},
  {id:'zl',name:'Z-LAG',calc:d=>{const v=calcZeroLag(d);const last=d[d.length-1].c;return{v,sig:last>v?'BUY':last<v?'SELL':'NTRL'};},fmt:v=>v.toFixed(0)},
  {id:'vp',name:'V-PROF',calc:d=>{const v=calcVolProfile(d);return{v,sig:v>1.2?'BUY':v<0.8?'SELL':'NTRL'};},fmt:v=>v.toFixed(2)+'×'},
  {id:'orb',name:'ORB',calc:d=>{const o=calcORBBreak(d);return{v:o.val,sig:o.sig};},fmt:v=>v},
  {id:'vwap',name:'VWAP',calc:d=>{const vw=calcVWAP(d);const last=d[d.length-1].c,vwLast=vw[vw.length-1];return{v:vwLast,sig:last>vwLast?'BUY':last<vwLast?'SELL':'NTRL'};},fmt:v=>v.toFixed(0)},
  {id:'mfi2',name:'MFI DIV',calc:d=>{const m1=calcMFI(d),m2=calcMFI(d.slice(0,-5));const p1=d[d.length-1].c,p2=d[d.length-6].c;const div=(m1>m2&&p1<p2)||(m1<m2&&p1>p2);return{v:m1.toFixed(0),sig:div?'SELL':m1>60?'BUY':'NTRL'};},fmt:v=>v},
  {id:'oi',name:'OI',calc:d=>{const chg=(Math.random()-.4)*30;return{v:chg,sig:chg>5?'BUY':chg<-5?'SELL':'NTRL'};},fmt:v=>(v>0?'+':'')+v.toFixed(1)+'%'},
];

function buildBoxes(){
  const grid=document.getElementById('ind-grid');
  grid.innerHTML='';
  INDS.forEach(ind=>{
    const box=document.createElement('div');
    box.className='ibox ntrl';
    box.id='box-'+ind.id;
    box.innerHTML=`<div class="iname">${ind.name}</div><div class="ival" id="val-${ind.id}">—</div><div class="isig" id="sig-${ind.id}">—</div>`;
    grid.appendChild(box);
  });
}

function updateBoxes(){
  INDS.forEach(ind=>{
    const {v,sig}=ind.calc(candles);
    const box=document.getElementById('box-'+ind.id);
    const valEl=document.getElementById('val-'+ind.id);
    const sigEl=document.getElementById('sig-'+ind.id);
    const cls=sig==='BUY'?'buy':sig==='SELL'?'sell':'ntrl';
    box.className='ibox '+cls;
    valEl.textContent=typeof v==='string'?v:ind.fmt(v);
    sigEl.textContent=sig==='BUY'?'BUY':sig==='SELL'?'SELL':'NTRL';
    box.classList.remove('flash');
    void box.offsetWidth;
    box.classList.add('flash');
  });
}

function calcSR(){
  const pv=(STOCK.high+STOCK.low+STOCK.close)/3;
  const r1=2*pv-STOCK.low,s1=2*pv-STOCK.high,buf=0.5*STOCK.atr;
  return {pv,r1,s1,buf,solid:STOCK.vol>1.5*STOCK.avgVol};
}

function findEntry(e9,e20){
  for(let i=e9.length-1;i>2;i--) if(e9[i]>=e20[i]&&e9[i-1]<e20[i-1]) return i;
  let mi=Math.floor(candles.length*.35);
  for(let i=mi+1;i<candles.length-8;i++) if(candles[i].l<candles[mi].l) mi=i;
  return mi;
}

function mk(t){return document.createElementNS(NS,t);}
function sa(el,a){for(const[k,v]of Object.entries(a))el.setAttribute(k,v);return el;}

function drawMain(){
  const svg=document.getElementById('main-svg');
  const wrap=document.getElementById('main-wrap');
  const W=wrap.clientWidth||375,H=wrap.clientHeight||220;
  const PAD={t:8,r:56,b:16,l:4};
  sa(svg,{viewBox:`0 0 ${W} ${H}`}); svg.innerHTML='';
  const cW=W-PAD.l-PAD.r,cH=H-PAD.t-PAD.b;
  const vn=ZOOM_STEPS[Math.min(zoomLevel-1,ZOOM_STEPS.length-1)];
  const si=Math.max(0,candles.length-vn);
  const vis=candles.slice(si);
  const e9all=calcEMA(candles,9),e20all=calcEMA(candles,20);
  const e9=e9all.slice(si),e20=e20all.slice(si);
  const fusion=e9.map((v,i)=>v*.6+e20[i]*.4);
  const vwap=calcVWAP(candles).slice(si);
  const allV=vis.flatMap(c=>[c.h,c.l]);
  const minV=Math.min(...allV)*.9993,maxV=Math.max(...allV)*1.0007,rng=maxV-minV;
  const sy=v=>PAD.t+cH-((v-minV)/rng)*cH;
  const sx=i=>PAD.l+(i+.5)*(cW/vis.length);
  const cw=Math.max(2,cW/vis.length-1.3);
  const poly=arr=>arr.map((v,i)=>`${sx(i).toFixed(1)},${sy(v).toFixed(1)}`).join(' ');
  const ap=el=>{svg.appendChild(el);return el;};
  for(let i=0;i<5;i++){const v=minV+(rng*i)/4;ap(sa(mk('line'),{x1:PAD.l,y1:sy(v),x2:PAD.l+cW,y2:sy(v),stroke:'#1a2840','stroke-width':'0.5','stroke-dasharray':'4,5',opacity:'.7'}));ap(sa(mk('text'),{x:PAD.l+cW+3,y:sy(v)+3,fill:'#3a4a68','font-size':'6.5','font-family':'monospace'})).textContent=v.toFixed(0);}
  const sr=calcSR();
  [[sr.r1+sr.buf,sr.r1-sr.buf,'rgba(192,57,43,.2)','#e74c3c','R1 '+sr.r1.toFixed(0),'#ff8877'],[sr.s1+sr.buf,sr.s1-sr.buf,'rgba(39,174,96,.18)','#27ae60','S1 '+sr.s1.toFixed(0),'#6effa0']].forEach(([top,bot,fill,bdr,lbl,lcol])=>{const zt=Math.min(top,maxV),zb=Math.max(bot,minV);if(zt<minV||zb>maxV)return;const y1=sy(zt),y2=sy(zb),h=Math.max(3,y2-y1);ap(sa(mk('rect'),{x:PAD.l,y:y1,width:cW,height:h,fill}));ap(sa(mk('rect'),{x:PAD.l,y:y1,width:2,height:h,fill:bdr}));ap(sa(mk('rect'),{x:PAD.l+cW,y:y1,width:55,height:h,fill,rx:'0'}));ap(sa(mk('text'),{x:PAD.l+cW+4,y:y1+h/2+3,fill:lcol,'font-size':'6','font-family':'monospace','font-weight':'bold'})).textContent=lbl+(sr.solid?' ✓':'');});
  ap(sa(mk('polyline'),{points:poly(vwap),fill:'none',stroke:'#b0c8ff','stroke-width':'1.0','stroke-dasharray':'3,3',opacity:'.7'}));
  ap(sa(mk('polyline'),{points:poly(fusion),fill:'none',stroke:'#c8901e','stroke-width':'2.2','stroke-linejoin':'round',opacity:'.97'}));
  vis.forEach((c,i)=>{const isUp=c.c>=c.o,col=isUp?'#27ae60':'#c0392b',colB=isUp?'#2ecc71':'#e74c3c';const bTop=sy(Math.max(c.o,c.c)),bH=Math.max(1,Math.abs(sy(c.o)-sy(c.c))),x=sx(i);ap(sa(mk('line'),{x1:x,y1:sy(c.h),x2:x,y2:sy(c.l),stroke:col,'stroke-width':'0.75'}));ap(sa(mk('rect'),{x:x-cw/2,y:bTop,width:cw,height:bH,fill:colB,rx:'0.2'}));});
  const eAbs=findEntry(e9all,e20all),eRel=eAbs-si;
  if(eRel>=0&&eRel<vis.length){const ex=sx(eRel),ep=vis[eRel].l,ey=sy(ep)+4;ap(sa(mk('line'),{x1:ex,y1:PAD.t,x2:ex,y2:sy(ep),stroke:'#2ecc71','stroke-width':'.9','stroke-dasharray':'3,3',opacity:'.6'}));ap(sa(mk('path'),{d:`M${ex},${ey} L${ex-6},${ey+11} L${ex+6},${ey+11} Z`,fill:'#2ecc71'}));const lw=66,lh=13,lx=Math.max(PAD.l,Math.min(ex-lw/2,PAD.l+cW-lw)),ly=ey+13;ap(sa(mk('rect'),{x:lx,y:ly,width:lw,height:lh,fill:'#0d3a1f',stroke:'#2ecc71','stroke-width':'1',rx:'0'}));ap(sa(mk('text'),{x:lx+lw/2,y:ly+9.5,fill:'#2ecc71','font-size':'7.5','font-family':'monospace','font-weight':'900','text-anchor':'middle','letter-spacing':'1.5'})).textContent='ENTRY '+ep.toFixed(0);}
  const lastC=vis[vis.length-1].c;
  ap(sa(mk('line'),{x1:PAD.l,y1:sy(lastC),x2:PAD.l+cW,y2:sy(lastC),stroke:'#f0bc2e','stroke-width':'.55','stroke-dasharray':'4,3',opacity:'.65'}));
  ap(sa(mk('rect'),{x:PAD.l+cW,y:sy(lastC)-6,width:55,height:12,fill:'#f0bc2e',rx:'0'}));
  ap(sa(mk('text'),{x:PAD.l+cW+28,y:sy(lastC)+3,fill:'#0b0e1a','font-size':'7','font-family':'monospace','font-weight':'900','text-anchor':'middle'})).textContent=lastC.toFixed(2);
  document.getElementById('v-f').textContent=fusion[fusion.length-1].toFixed(2);
  document.getElementById('v-vw').textContent=vwap[vwap.length-1].toFixed(2);
  document.getElementById('ltp').textContent=lastC.toFixed(2);
  const prev=vis[vis.length-2]?.c||lastC,pct=((lastC-prev)/prev*100).toFixed(2),isUp=lastC>=prev;
  document.getElementById('ltp').style.color=isUp?'#2ecc71':'#e74c3c';
  document.getElementById('chg').style.color=isUp?'#2ecc71':'#e74c3c';
  document.getElementById('chg').textContent=(isUp?'▲ +':'▼ ')+pct+'%';
  document.getElementById('zlbl').textContent=`ZOOM ${zoomLevel}×  —  ${vis.length} candles`;
}

function doZoom(d){zoomLevel=Math.max(1,Math.min(ZOOM_STEPS.length,zoomLevel+d));drawMain();}
const VM={'1m':.004,'5m':.006,'10m':.008,'15m':.011,'1h':.014,'1D':.019};
function setTF(btn,tf){document.querySelectorAll('.tf').forEach(b=>b.classList.remove('on'));btn.classList.add('on');candles=genCandles(90,BASE,VM[tf]||.008);zoomLevel=1;drawMain();updateBoxes();}
function liveTick(){const last=candles[candles.length-1];const o=last.c,mv=(Math.random()-.47)*.004*o,c=o+mv,wk=Math.random()*.002*o;candles.push({o,h:Math.max(o,c)+wk,l:Math.min(o,c)-wk*.6,c});if(candles.length>130)candles.shift();drawMain();updateBoxes();}

window.addEventListener('resize',()=>{drawMain();});
// ✅ FIXED: यहाँ पूरा कॉल सही है
candles = genCandles(90, BASE, 0.008);
buildBoxes();
setTF(document.querySelector('.tf.on'), '10m');
setInterval(liveTick, 3000);
</script>
