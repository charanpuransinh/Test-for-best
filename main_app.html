<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>TRISHUL PRO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#000;overflow:hidden;}

.shell{
  width:100%;max-width:430px;height:100%;
  margin:0 auto;display:flex;flex-direction:column;background:#000;
}

/* ── Swiper: CSS snap = browser handles native swipe, even inside iframes ── */
.swiper{
  flex:1;min-height:0;
  display:flex;
  overflow-x:scroll;
  overflow-y:hidden;
  scroll-snap-type:x mandatory;
  scroll-behavior:auto;           /* instant by default */
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-x:contain;  /* stop swipe from triggering browser back */
}
.swiper::-webkit-scrollbar{display:none;}

.slide{
  flex:0 0 100%;
  height:100%;
  scroll-snap-align:start;
  scroll-snap-stop:always;        /* one slide per swipe */
}
.slide iframe{width:100%;height:100%;border:none;display:block;}

/* ── Bottom Nav ── */
.bnav{
  flex-shrink:0;
  display:grid;
  grid-template-columns:repeat(6,1fr);
  background:#000;
  border-top:2px solid #F5C518;
  height:50px;
}
.bn{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:1px;cursor:pointer;
  color:#555;
  border-right:1px solid #111;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.bn:last-child{border-right:none;}
.bn:active{background:rgba(245,197,24,.08);}
.bn.on{color:#F5C518;background:linear-gradient(180deg,rgba(245,197,24,.12),transparent);}
.bn.on .bn-i{filter:drop-shadow(0 0 5px rgba(245,197,24,.6));}
.bn-i{font-size:17px;line-height:1;}
.bn-t{font-size:7px;font-weight:800;letter-spacing:.4px;margin-top:2px;}
</style>
</head>
<body>

<div class="shell">
  <div class="swiper" id="swiper">
    <div class="slide"><iframe src="2_home_page.html"     title="HOME"  ></iframe></div>
    <div class="slide"><iframe src="5_scanner.html"       title="SIGNAL"></iframe></div>
    <div class="slide"><iframe src="3_power_box.html"     title="POWER" ></iframe></div>
    <div class="slide"><iframe src="4_chart_page.html"    title="CHART" ></iframe></div>
    <div class="slide"><iframe src="6_watchlist.html"     title="WATCH" ></iframe></div>
    <div class="slide"><iframe src="8_control_panel.html" title="ADMIN" ></iframe></div>
  </div>

  <nav class="bnav">
    <div class="bn on" onclick="goSlide(0)"><div class="bn-i">🏠</div><div class="bn-t">HOME</div></div>
    <div class="bn"    onclick="goSlide(1)"><div class="bn-i">📡</div><div class="bn-t">SIGNAL</div></div>
    <div class="bn"    onclick="goSlide(2)"><div class="bn-i">⚡</div><div class="bn-t">POWER</div></div>
    <div class="bn"    onclick="goSlide(3)"><div class="bn-i">📈</div><div class="bn-t">CHART</div></div>
    <div class="bn"    onclick="goSlide(4)"><div class="bn-i">⭐</div><div class="bn-t">WATCH</div></div>
    <div class="bn"    onclick="goSlide(5)"><div class="bn-i">⚙️</div><div class="bn-t">ADMIN</div></div>
  </nav>
</div>

<script>
/* ── Login guard ── */
if(!sessionStorage.getItem('tp_auth')){
  window.location.replace('1_login.html');
}

const swiper = document.getElementById('swiper');
const bns    = document.querySelectorAll('.bn');
const TOTAL  = 6;
let cur = 0;
let isScrolling = false;

function setActive(idx){
  cur = idx;
  bns.forEach((b,i) => b.classList.toggle('on', i===idx));
}

/* ── Nav tap: instant jump, no animation ── */
function goSlide(idx){
  if(idx < 0 || idx >= TOTAL || idx === cur) return;
  /* disable scroll-snap momentarily for instant jump */
  swiper.style.scrollSnapType = 'none';
  swiper.scrollLeft = swiper.clientWidth * idx;
  /* re-enable snap after jump settles */
  requestAnimationFrame(()=>{
    swiper.style.scrollSnapType = '';
    setActive(idx);
  });
}

/* ── Update nav when user swipes ── */
let snapTimer;
swiper.addEventListener('scroll', ()=>{
  clearTimeout(snapTimer);
  snapTimer = setTimeout(()=>{
    const idx = Math.round(swiper.scrollLeft / swiper.clientWidth);
    if(idx !== cur) setActive(idx);
  }, 60);
}, {passive:true});

/* ── postMessage from iframes (when goPage() is called inside) ── */
window.addEventListener('message', e => {
  if(e.data && typeof e.data.goSlide === 'number') goSlide(e.data.goSlide);
});
</script>
</body>
</html>
